name: PHP Lint

on:
  push:
    branches: [main, develop]
    paths:
      - 'wp-content/themes/child-theme/**'
      - '.github/workflows/lint.yml'
  pull_request:
    branches: [main]
    paths:
      - 'wp-content/themes/child-theme/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wp-content/themes/child-theme

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer, cs2pr

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-

      - name: Install PHPCS and WordPress Coding Standards
        run: |
          composer global config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require \
            squizlabs/php_codesniffer \
            wp-coding-standards/wpcs \
            phpcsstandards/phpcsutils \
            phpcsstandards/phpcsextra

      - name: Check PHP syntax
        run: |
          errors=$(find . -name "*.php" ! -path "./vendor/*" -exec php -l {} \; | grep -v "^No syntax errors" || true)
          if [ -n "$errors" ]; then
            echo "$errors"
            exit 1
          fi
          echo "No PHP syntax errors found."

      - name: Run PHPCS
        run: |
          phpcs \
            --standard=WordPress \
            --extensions=php \
            --ignore=vendor/,node_modules/ \
            --report=checkstyle \
            --report-file=phpcs-report.xml \
            . || true

      - name: Annotate violations via cs2pr
        run: cs2pr phpcs-report.xml

      - name: Fail if violations found
        run: |
          if grep -q '<error' phpcs-report.xml; then
            echo "PHPCS errors found. See annotations above."
            exit 1
          fi
